<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - API Provider Service</title>
    <link rel="stylesheet" href="/css/github-dark.css">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/dashboard" class="sidebar-brand">
                    <i data-lucide="flame" style="width:20px;height:20px;"></i>
                    API Provider
                </a>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item">
                        <a href="/dashboard" class="sidebar-nav-link">
                            <i data-lucide="layout-dashboard" style="width:16px;height:16px;"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/keys" class="sidebar-nav-link">
                            <i data-lucide="key-round" style="width:16px;height:16px;"></i>
                            API Keys
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/models" class="sidebar-nav-link">
                            <i data-lucide="cpu" style="width:16px;height:16px;"></i>
                            Models
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/monitor" class="sidebar-nav-link active">
                            <i data-lucide="activity" style="width:16px;height:16px;"></i>
                            Monitor
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/settings" class="sidebar-nav-link">
                            <i data-lucide="settings" style="width:16px;height:16px;"></i>
                            Settings
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/docs" class="sidebar-nav-link">
                            <i data-lucide="book-open" style="width:16px;height:16px;"></i>
                            Documentation
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar">
                    <i data-lucide="user" style="width:14px;height:14px;"></i>
                </div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebar-username">Admin</div>
                </div>
                <a href="#" onclick="logout(); return false;" style="color:var(--text-muted);display:flex;" title="Logout">
                    <i data-lucide="log-out" style="width:16px;height:16px;"></i>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <div class="action-bar" style="margin-bottom:0;">
                        <div class="action-bar-left">
                            <h1 class="page-title">
                                <i data-lucide="activity" style="width:22px;height:22px;"></i>
                                Real-time Monitor
                            </h1>
                        </div>
                        <div class="action-bar-right">
                            <label class="checkbox">
                                <input type="checkbox" id="auto-refresh" checked>
                                <span>Auto-refresh</span>
                            </label>
                            <button class="btn btn-secondary" onclick="loadLogs()">
                                <i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>
                                Refresh
                            </button>
                            <button class="btn btn-secondary" onclick="exportLogs()">
                                <i data-lucide="download" style="width:14px;height:14px;"></i>
                                Export
                            </button>
                        </div>
                    </div>
                    <p class="page-subtitle">Monitor API requests in real-time</p>
                </div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Status</label>
                                <select id="filter-status" class="select" onchange="loadLogs()">
                                    <option value="">All</option>
                                    <option value="success">Success (2xx)</option>
                                    <option value="error">Error (4xx, 5xx)</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Endpoint</label>
                                <select id="filter-endpoint" class="select" onchange="loadLogs()">
                                    <option value="">All</option>
                                    <option value="/v1/chat/completions">/v1/chat/completions</option>
                                    <option value="/v1/completions">/v1/completions</option>
                                    <option value="/v1/messages">/v1/messages</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Limit</label>
                                <select id="filter-limit" class="select" onchange="loadLogs()">
                                    <option value="50">50</option>
                                    <option value="100" selected>100</option>
                                    <option value="200">200</option>
                                    <option value="500">500</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div style="overflow-x: auto;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Method</th>
                                        <th>Endpoint</th>
                                        <th>Model</th>
                                        <th>Status</th>
                                        <th>Tokens</th>
                                        <th>Latency</th>
                                        <th>IP</th>
                                    </tr>
                                </thead>
                                <tbody id="logs-table">
                                    <tr>
                                        <td colspan="8" class="text-center text-secondary">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-3">
                    <div class="text-secondary" style="font-family:var(--font-display);font-size:12px;">
                        Showing <span id="logs-count">0</span> requests
                    </div>
                    <div class="flex gap-1">
                        <button class="btn btn-secondary btn-sm" onclick="previousPage()" id="prev-btn" disabled>
                            <i data-lucide="chevron-left" style="width:14px;height:14px;"></i>
                            Previous
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="nextPage()" id="next-btn">
                            Next
                            <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/monitor.js"></script>
    <script>
        lucide.createIcons();
        if (getUsername()) {
            document.getElementById('sidebar-username').textContent = getUsername();
        }
    </script>
</body>
</html>
